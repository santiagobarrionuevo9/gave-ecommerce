spring.application.name=gave-backend


server.port=${PORT:8080}


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html


app.upload.dir=./uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


app.jwt.secret=${JWT_SECRET}
app.jwt.exp-min=120

resend.api.key=${RESEND_API_KEY}

app.mail.from=${MAIL_FROM}
app.mail.from-name=GaVe Store
app.mail.reply-to=soporte@gavefiltros.com.ar

app.mail.test-mode=false
app.mail.test-to=tuemaildepruebas@gmail.com

app.frontend.base-url=https://flourishing-brioche-0c08f0.netlify.app

cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_KEY}
cloudinary.api-secret=${CLOUD_SECRET}
cloudinary.folder=gave/products


logging.level.root=INFO
logging.level.org.example.gavebackend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000